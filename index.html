<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akutemanmu</title>
    <link rel="icon" type="image/png" href="image/logoabsen.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Warna dasar latar belakang (sangat terang/putih kebiruan) */
            background-color: #f8fafc;
            /* Pola Titik-titik menggunakan radial-gradient */
            background-image: radial-gradient(rgba(14, 165, 233, 0.15) 2px, transparent 2px);
            background-size: 24px 24px;
        }

        /* Animasi sederhana saat halaman dimuat */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }
    </style>
</head>

<body class="relative min-h-screen text-slate-800 flex justify-center items-center py-12 px-4">

    <div
        class="w-full max-w-md mx-auto bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden border border-white animate-fade-in">

        <div
            class="relative w-full aspect-[10/3] bg-slate-100 border-b border-gray-100 flex items-center justify-center overflow-hidden">

            <div id="fallback-banner"
                class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-r from-gray-50 via-slate-100 to-gray-50">
                <div class="absolute top-1 left-4 text-cyan-300 opacity-60"><i data-lucide="flower-2"
                        class="w-8 h-8"></i></div>
                <div class="absolute bottom-1 right-6 text-cyan-400 opacity-60"><i data-lucide="flower-2"
                        class="w-10 h-10"></i></div>

                <div class="text-center z-10 flex items-center gap-1 sm:gap-2">
                    <span class="text-4xl sm:text-5xl font-extrabold text-cyan-400">#</span>
                    <div class="flex flex-col text-left leading-[1.1]">
                        <span class="text-xl sm:text-2xl font-extrabold text-white"
                            style="-webkit-text-stroke: 1.5px #38bdf8; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">TemanBaik</span>
                        <span class="text-xl sm:text-2xl font-extrabold text-white"
                            style="-webkit-text-stroke: 1.5px #0284c7; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">SalingMembantu</span>
                    </div>
                </div>
            </div>

            <img src="image/headerformabsen.png" alt="Header Akutemanmu"
                class="absolute inset-0 w-full h-full object-cover z-10"
                onerror="this.style.opacity='0'; this.style.pointerEvents='none';"
                onload="this.style.position='relative'; document.getElementById('fallback-banner').style.display='none';">
        </div>

        <div class="relative p-6 sm:p-8 flex flex-col items-center pt-12 sm:pt-14">

            <div
                class="w-20 h-20 -mt-4 mb-8 bg-white rounded-full shadow-md border border-slate-100 flex items-center justify-center overflow-hidden z-20">
                <img src="image/logoabsen.png" alt="Logo AkuTemanmu" class="w-3/4 h-3/4 object-contain"
                    onerror="this.src='https://ui-avatars.com/api/?name=Aku+Temanmu&background=0284c7&color=fff'">
            </div>

            <h1 class="mt-16text-xl font-bold text-sky-900 mb-2 text-center tracking-tight">Portal Absensi Relawan</h1>
            <p class="text-slate-500 text-sm text-center mb-8 font-medium">
                Silakan pilih formulir absensi sesuai dengan kegiatan Kamu hari ini.
            </p>

            <div class="flex flex-col gap-4 w-full">

                <a href="https://forms.gle/XM74vcRs47K2Kxc78" target="_blank" rel="noopener noreferrer"
                    class="group flex items-center justify-between w-full p-4 bg-white hover:bg-sky-50 border-2 border-sky-100 hover:border-sky-300 rounded-2xl transition-all duration-300 hover:scale-[1.02] hover:shadow-md animate-fade-in delay-100 opacity-0 cursor-pointer">
                    <div class="flex items-center">
                        <div
                            class="bg-sky-100 text-sky-600 p-2.5 rounded-xl mr-4 group-hover:bg-sky-500 group-hover:text-white transition-colors">
                            <i data-lucide="users" class="w-5 h-5"></i>
                        </div>
                        <span
                            class="font-semibold text-slate-700 group-hover:text-sky-900 text-sm text-left leading-tight">Absensi
                            Kegiatan/Event Offline</span>
                    </div>
                    <i data-lucide="chevron-right"
                        class="text-sky-300 group-hover:text-sky-600 transition-colors w-5 h-5 flex-shrink-0 ml-2"></i>
                </a>

                <a href="https://forms.gle/8xpcvb2un62Ud8QPA" target="_blank" rel="noopener noreferrer"
                    class="group flex items-center justify-between w-full p-4 bg-white hover:bg-sky-50 border-2 border-sky-100 hover:border-sky-300 rounded-2xl transition-all duration-300 hover:scale-[1.02] hover:shadow-md animate-fade-in delay-200 opacity-0 cursor-pointer">
                    <div class="flex items-center">
                        <div
                            class="bg-sky-100 text-sky-600 p-2.5 rounded-xl mr-4 group-hover:bg-sky-500 group-hover:text-white transition-colors">
                            <i data-lucide="home" class="w-5 h-5"></i>
                        </div>
                        <span
                            class="font-semibold text-slate-700 group-hover:text-sky-900 text-sm text-left leading-tight">Absensi
                            Kunjungan Rumah Konseling</span>
                    </div>
                    <i data-lucide="chevron-right"
                        class="text-sky-300 group-hover:text-sky-600 transition-colors w-5 h-5 flex-shrink-0 ml-2"></i>
                </a>

                <a href="https://forms.gle/APC8gKwt1A4RgfA6A" target="_blank" rel="noopener noreferrer"
                    class="group flex items-center justify-between w-full p-4 bg-white hover:bg-sky-50 border-2 border-sky-100 hover:border-sky-300 rounded-2xl transition-all duration-300 hover:scale-[1.02] hover:shadow-md animate-fade-in delay-300 opacity-0 cursor-pointer">
                    <div class="flex items-center">
                        <div
                            class="bg-sky-100 text-sky-600 p-2.5 rounded-xl mr-4 group-hover:bg-sky-500 group-hover:text-white transition-colors">
                            <i data-lucide="video" class="w-5 h-5"></i>
                        </div>
                        <span
                            class="font-semibold text-slate-700 group-hover:text-sky-900 text-sm text-left leading-tight">Absensi
                            Kegiatan/Event Online</span>
                    </div>
                    <i data-lucide="chevron-right"
                        class="text-sky-300 group-hover:text-sky-600 transition-colors w-5 h-5 flex-shrink-0 ml-2"></i>
                </a>

            </div>

            <div
                class="flex justify-center gap-5 mt-8 pt-6 border-t border-slate-100 w-full animate-fade-in delay-300 opacity-0">
                <a href="#" class="text-sky-600/60 hover:text-sky-600 hover:scale-110 transition-all"
                    title="@akuteman_mu">
                    <i data-lucide="instagram" class="w-5 h-5"></i>
                </a>
                <a href="#" class="text-sky-600/60 hover:text-sky-600 hover:scale-110 transition-all"
                    title="TikTok @akuteman_mu">
                    <i data-lucide="music-2" class="w-5 h-5"></i>
                </a>
                <a href="#" class="text-sky-600/60 hover:text-sky-600 hover:scale-110 transition-all"
                    title="X @Akuteman_muu">
                    <i data-lucide="twitter" class="w-5 h-5"></i>
                </a>
                <a href="#" class="text-sky-600/60 hover:text-sky-600 hover:scale-110 transition-all"
                    title="Facebook Aku Temanmu">
                    <i data-lucide="facebook" class="w-5 h-5"></i>
                </a>
            </div>
        </div>

    </div>

    <script>
        // Inisialisasi ikon dari Lucide
        lucide.createIcons();
    </script>
</body>

</html>
